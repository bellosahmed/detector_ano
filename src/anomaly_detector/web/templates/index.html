<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anomaly Detector</title>
<style>
  :root{
    --paper:#eef2f8; --surface:#fff; --ink:#0e1420; --muted:#5f6b83;
    --line:#e0e6f0; --grid:#e9eef6;
    --flux:#3b4ef0; --flux-weak:#e9ecff;
    --coral:#ff4d55; --coral-weak:#ffe9ea;
    --teal:#0e9c7a; --amber:#bd7a12;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55}
  ::selection{background:var(--flux);color:#fff}

  /* instrument header */
  .bar{display:flex;align-items:baseline;gap:14px;padding:20px 30px;
    background:var(--ink);color:#fff}
  .bar h1{margin:0;font-size:18px;letter-spacing:-.2px;font-weight:650}
  .bar .sub{font-family:var(--mono);font-size:12px;color:#9aa7c4;letter-spacing:.2px}
  .led{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);
    font-size:12px;color:#8fe6c8;letter-spacing:.4px}
  .led i{width:8px;height:8px;border-radius:50%;background:#22d39b;box-shadow:0 0 0 0 rgba(34,211,155,.6);
    animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,155,.5)}70%{box-shadow:0 0 0 7px rgba(34,211,155,0)}100%{box-shadow:0 0 0 0 rgba(34,211,155,0)}}

  .wrap{max-width:1060px;margin:0 auto;padding:30px}
  .lede{color:var(--muted);margin:0 0 20px;max-width:64ch}

  /* input port */
  .drop{display:block;border:1.5px solid var(--line);border-left:4px solid var(--flux);
    border-radius:12px;padding:28px 26px;background:var(--surface);cursor:pointer;transition:.15s}
  .drop:hover,.drop.over{border-color:var(--flux);background:var(--flux-weak)}
  .drop .big{font-size:16px;font-weight:600}
  .drop .big b{color:var(--flux)}
  .drop small{display:block;color:var(--muted);margin-top:5px;font-family:var(--mono);font-size:12px}
  .opt{display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-size:13px;color:var(--muted);cursor:pointer}
  .opt small{color:#9aa7c4}
  .spin{display:none;margin-top:14px;font-family:var(--mono);color:var(--muted);font-size:13px}

  /* readout strip (device status) */
  .readout{display:flex;flex-wrap:wrap;gap:0;margin:22px 0 8px;border:1px solid var(--line);
    border-radius:12px;overflow:hidden;background:var(--surface)}
  .readout .cell{flex:1;min-width:120px;padding:13px 16px;border-right:1px solid var(--line)}
  .readout .cell:last-child{border-right:0}
  .readout .k{font-family:var(--mono);font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .readout .v{font-family:var(--mono);font-size:19px;font-weight:600;margin-top:3px}
  .readout .v.alert{color:var(--coral)}
  .readout select{font-family:var(--mono);font-size:15px;font-weight:600;border:1px solid var(--line);
    border-radius:6px;padding:2px 4px;background:#fff;color:var(--ink);max-width:100%}
  .readout select:focus{outline:none;border-color:var(--flux)}
  .sentinel{font-family:var(--mono);font-size:12px;color:var(--muted);margin:4px 2px 0}

  /* console */
  .console{display:none;margin:22px 0 6px}
  .console .field{display:flex;gap:0;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface)}
  .console .field:focus-within{border-color:var(--flux)}
  .console input{flex:1;border:0;padding:14px 16px;font-size:15px;font-family:var(--sans);outline:none;background:transparent}
  .console button{border:0;background:var(--flux);color:#fff;font-weight:600;padding:0 22px;cursor:pointer;font-size:14px}
  .console button:hover{background:#2f40d8}
  .chips{margin:9px 2px 0;display:flex;gap:8px;flex-wrap:wrap}
  .chips b{font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer;
    border:1px dashed var(--line);border-radius:20px;padding:3px 10px;font-weight:400}
  .chips b:hover{border-color:var(--flux);color:var(--flux)}
  .ai{display:inline-flex;align-items:center;gap:7px;margin:10px 2px 0;font-size:13px;color:var(--muted);cursor:pointer}
  .ai small{color:#9aa7c4}
  .answer{margin-top:12px}
  .answer .a{background:var(--ink);color:#eef;border-radius:12px;padding:14px 16px;
    font-size:15px;line-height:1.5}
  .answer .a .num{font-family:var(--mono);color:#8fe6c8}

  /* signal panel */
  .panel{border:1px solid var(--line);border-radius:14px;background:var(--surface);
    margin:20px 0;overflow:hidden}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .phead h3{margin:0;font-size:15px;font-family:var(--mono);letter-spacing:.2px}
  .phead .n{font-family:var(--mono);font-size:13px;color:var(--coral);font-weight:600}
  .chartwrap{padding:8px 10px 2px}
  svg{width:100%;height:230px;display:block}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:9px 18px;border-top:1px solid var(--line);vertical-align:top}
  th{font-family:var(--mono);font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:600}
  td.mono{font-family:var(--mono);font-size:13px;white-space:nowrap}
  td.z{font-family:var(--mono);color:var(--coral);font-weight:600}
  td.why{color:var(--muted);font-size:13px;max-width:440px}
  .comove{margin-top:4px;font-family:var(--mono);font-size:12px;color:#7b3fe4}
  .tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.5px;
    padding:2px 7px;border-radius:5px;font-weight:600;margin-right:8px;vertical-align:1px}
  .tag.real{background:#e2f6ef;color:var(--teal)}
  .tag.glitch{background:#fbeed6;color:var(--amber)}
  .tag.single{background:#eef1f7;color:var(--muted)}
  .tag.shape{background:#efe6fb;color:#7b3fe4}
  .foot{padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .err{background:var(--coral-weak);border:1px solid #f4b9bb;color:#b02;padding:13px 16px;border-radius:11px;margin-top:16px}
  .muted{color:var(--muted)}
  @media (prefers-reduced-motion:reduce){.led i{animation:none}}
  @media (max-width:640px){.wrap{padding:20px}.bar{padding:16px 20px}}
</style>
</head>
<body>
<div class="bar">
  <h1>Anomaly Detector</h1>
  <span class="sub">signal &rarr; anomalies &rarr; answers</span>
  <span class="led"><i></i>LOCAL &middot; NO CLOUD</span>
</div>

<div class="wrap">
  <p class="lede">Drop in any time-series CSV. It finds the moments that break the pattern, explains
    each one, and answers questions about it — every figure computed by code, never guessed.</p>

  <label class="drop" id="drop">
    <span class="big"><b>Load a CSV</b> or drag one here</span>
    <small>time column + one or more numeric signals &nbsp;·&nbsp; e.g. samples/sensor.csv</small>
    <input id="file" type="file" accept=".csv,.xlsx,.xls" hidden>
  </label>
  <label class="opt"><input type="checkbox" id="deepshape"> Deep shape scan
    <small>(also flag unusual patterns, not just spikes — slower, needs the “shape” extra)</small></label>
  <div class="spin" id="spin">reading trace…</div>

  <div class="console" id="console">
    <div class="field">
      <input id="q" type="text" placeholder="Ask this dataset a question…">
      <button id="askbtn">Ask</button>
    </div>
    <div class="chips" id="chips"></div>
    <label class="ai"><input type="checkbox" id="useai"> Explain with AI <small>(local model, if installed — numbers stay computed)</small></label>
    <div class="answer" id="answer"></div>
  </div>

  <div id="out"></div>
</div>

<script>
const $ = s => document.querySelector(s);
const drop=$("#drop"), file=$("#file"), out=$("#out"), spin=$("#spin"), consoleEl=$("#console");
let currentFile = null;

// the <input> is inside the <label>, so the click opens the dialog natively (no manual .click()).
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",ev=>{ if(ev.dataTransfer.files.length) send(ev.dataTransfer.files[0]); });
file.addEventListener("change",()=>{ if(file.files.length) send(file.files[0]); });

const SUGGEST=["what was the highest value?","was March higher than April?","how much data is missing?","were there any anomalies?"];

function send(f){ currentFile=f; runAnalyze(); }

function runAnalyze(timeCol){
  out.innerHTML=""; consoleEl.style.display="none"; $("#answer").innerHTML="";
  spin.style.display="block";
  const fd=new FormData(); fd.append("file",currentFile);
  if($("#deepshape").checked) fd.append("shape","1");
  if(timeCol) fd.append("time_col", timeCol);
  fetch("/api/analyze",{method:"POST",body:fd})
    .then(r=>r.json().then(j=>({ok:r.ok,j})))
    .then(({ok,j})=>{ spin.style.display="none";
      if(ok){ render(j); setupConsole(); } else err(j.error); })
    .catch(e=>{ spin.style.display="none"; err(e.message); });
}
// let the user correct the auto-detected time column
document.addEventListener("change", e=>{ if(e.target.id==="tcol") runAnalyze(e.target.value); });
function err(m){ out.innerHTML=`<div class="err">${m}</div>`; }

function setupConsole(){
  consoleEl.style.display="block";
  $("#chips").innerHTML = SUGGEST.map(s=>`<b>${s}</b>`).join("");
  $("#chips").querySelectorAll("b").forEach(b=>b.onclick=()=>{ $("#q").value=b.textContent; askQuestion(); });
}
function askQuestion(){
  const q=$("#q").value.trim(); if(!q||!currentFile) return;
  const el=$("#answer"); el.innerHTML=`<div class="a">…</div>`;
  const fd=new FormData(); fd.append("file",currentFile); fd.append("question",q);
  if($("#useai").checked) fd.append("use_llm","1");
  fetch("/api/ask",{method:"POST",body:fd}).then(r=>r.json())
    .then(j=>{ const t=j.answer||("⚠ "+j.error);
      el.innerHTML=`<div class="a">${t.replace(/([\d,]+\.?\d*)/g,'<span class="num">$1</span>')}</div>`; })
    .catch(e=>el.innerHTML=`<div class="a">⚠ ${e.message}</div>`);
}
document.addEventListener("click",e=>{ if(e.target.id==="askbtn") askQuestion(); });
document.addEventListener("keydown",e=>{ if(e.target.id==="q"&&e.key==="Enter") askQuestion(); });

function render(d){
  const p=d.profile;
  const total=Object.values(d.anomalies).reduce((s,a)=>s+a.length,0);
  let h=`<div class="readout">
    <div class="cell"><div class="k">rows</div><div class="v">${p.n_rows.toLocaleString()}</div></div>
    <div class="cell"><div class="k">time column</div><div class="v">${timeSelect(p.time_col, d.columns)}</div></div>
    <div class="cell"><div class="k">cadence</div><div class="v">${p.freq??"—"}</div></div>
    <div class="cell"><div class="k">signals</div><div class="v">${p.signals.length}</div></div>
    <div class="cell"><div class="k">anomalies</div><div class="v alert">${total}</div></div>
  </div>`;
  if(p.sentinels.length) h+=`<div class="sentinel">↳ ignored missing-value markers (not anomalies): ${p.sentinels.join(", ")}</div>`;
  for(const sig of p.signals){
    const a=d.anomalies[sig];
    h+=`<div class="panel">
      <div class="phead"><h3>${sig}</h3><span class="n">${a.length} flagged</span></div>
      <div class="chartwrap">${chart(d.series[sig],a)}</div>
      ${tableFor(a)}</div>`;
  }
  out.innerHTML=h;
}

function timeSelect(current, cols){
  cols = cols || [];
  const opts = cols.map(c=>`<option value="${c}" ${c===current?"selected":""}>${c}</option>`).join("");
  return `<select id="tcol" title="wrong column? pick the right one">${opts}</select>`;
}
function tag(a){
  if(a.kind==="shape")                       return `<span class="tag shape">SHAPE</span>`;
  const v=(a.verdict||"").toLowerCase();
  if(v.includes("real event")) return `<span class="tag real">REAL EVENT</span>`;
  if(v.includes("glitch"))     return `<span class="tag glitch">CHECK SENSOR</span>`;
  return `<span class="tag single">SINGLE SIGNAL</span>`;
}
function tableFor(anoms){
  if(!anoms.length) return `<div class="foot">No anomalies found — the signal stays within its normal pattern.</div>`;
  const fmt=v=>typeof v==="number"?(+v.toFixed(3)).toLocaleString():v;
  const rows=anoms.slice().sort((a,b)=>b.zscore-a.zscore).slice(0,15).map(a=>
    `<tr><td class="mono">${a.time}</td><td class="mono">${fmt(a.value)}</td>
      <td class="z">${a.zscore}</td>
      <td class="why">${tag(a)}${a.explanation||""}${
        (a.co_moving&&a.co_moving.length)?`<div class="comove">↔ moved with: ${a.co_moving.join(", ")}</div>`:""}</td></tr>`).join("");
  const more=anoms.length>15?`<div class="foot">showing 15 of ${anoms.length}, most unusual first</div>`:"";
  return `<table><thead><tr><th>when</th><th>value</th><th>z</th><th>why it was flagged</th></tr></thead>
    <tbody>${rows}</tbody></table>${more}`;
}

function chart(series,anoms){
  const W=1000,H=230,padL=46,padR=14,padY=22;
  const v=series.v,t=series.t;
  const xs=v.map((_,i)=>padL+i*(W-padL-padR)/Math.max(1,v.length-1));
  const fin=v.filter(x=>x!=null&&!isNaN(x));
  const min=Math.min(...fin),max=Math.max(...fin),rng=(max-min)||1;
  const y=val=>H-padY-(val-min)/rng*(H-2*padY);
  // grid + axis labels (mono readout feel)
  let grid="";
  for(let i=0;i<=4;i++){ const val=min+rng*i/4, yy=y(val);
    grid+=`<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="#e9eef6"/>`;
    grid+=`<text x="${padL-8}" y="${(yy+4).toFixed(1)}" text-anchor="end" font-size="11"
      font-family="ui-monospace,Menlo,monospace" fill="#8b97b2">${(+val.toFixed(2)).toLocaleString()}</text>`;
  }
  let path="";
  v.forEach((val,i)=>{ if(val==null||isNaN(val))return; path+=(path?" L":"M")+xs[i].toFixed(1)+" "+y(val).toFixed(1); });
  const idx=new Map(t.map((ts,i)=>[ts,i]));
  const near=ts=>{ if(idx.has(ts))return idx.get(ts); let b=null,bd=1/0,g=Date.parse(ts);
    if(isNaN(g))return null; t.forEach((x,i)=>{const dd=Math.abs(Date.parse(x)-g); if(dd<bd){bd=dd;b=i;}}); return b; };
  let dots="";
  anoms.forEach(a=>{ const i=near(a.time); if(i==null)return; const cx=xs[i].toFixed(1),cy=y(a.value).toFixed(1);
    dots+=`<circle cx="${cx}" cy="${cy}" r="7" fill="#ff4d55" opacity="0.16"/>
      <circle cx="${cx}" cy="${cy}" r="3.4" fill="#ff4d55"><title>${a.time} · value=${a.value} · z=${a.zscore}</title></circle>`; });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="signal trace with anomalies">
    ${grid}<path d="${path}" fill="none" stroke="#3b4ef0" stroke-width="1.5" stroke-linejoin="round"/>${dots}</svg>`;
}
</script>
</body>
</html>
